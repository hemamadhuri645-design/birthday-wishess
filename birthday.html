<style>

    color:white;
    text-align:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

.card{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    font-size:18px;
    cursor:pointer;
}

h1{
    animation:fade 1s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:fall 4s linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

function nextStep(){
